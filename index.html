<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Maniac Mansion Mania TV</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="layout">
      <figure class="site-banner-wrap">
        <img
          class="site-banner"
          src="vod_banner.png"
          alt="MANIAC MANSION MANIA — Banner"
          width="1824"
          height="165"
          loading="eager"
          decoding="async"
        />
      </figure>

      <section class="tv-column" aria-label="Video">
        <div class="tv-casing">
          <div class="tv-screen">
            <div id="player"></div>
          </div>
          <div class="tv-scanlines" aria-hidden="true"></div>
        </div>

        <div class="deck" role="group" aria-label="Playback controls">
          <button type="button" id="btn-play-pause" class="deck-btn" aria-pressed="false">
            Play
          </button>
          <button type="button" id="btn-next" class="deck-btn">Next</button>
        </div>
      </section>

      <aside class="meta-column" aria-label="Episode details">
        <h2 class="meta-heading">Now showing</h2>
        <dl class="meta-list" id="meta-panel"></dl>
      </aside>
    </main>

    <p id="status-line" class="status-line" role="status"></p>

    <footer class="site-footer">
      <nav class="site-footer-nav" aria-label="Maniac Mansion Mania">
        <a href="https://www.maniac-mansion-mania.de/" target="_blank" rel="noopener noreferrer">maniac-mansion-mania.de</a>
        <span class="site-footer-sep" aria-hidden="true">·</span>
        <a href="https://www.maniac-mansion-mania.de/forum" target="_blank" rel="noopener noreferrer">Forum</a>
        <span class="site-footer-sep" aria-hidden="true">·</span>
        <span class="site-footer-year">2026</span>
      </nav>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="app.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
  </body>
</html>
