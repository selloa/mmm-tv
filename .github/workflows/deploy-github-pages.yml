# GitHub Pages: statische Site aus dem Repo-Root (index.html, app.js, styles.css, source/, …)
#
# Einmalig im Repo unter Settings → Pages:
#   Source: „GitHub Actions“ wählen (nicht „Deploy from a branch“).
#
# Ergebnis: z. B. https://<user>.github.io/<repo>/

name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - "index.html"
      - "app.js"
      - "styles.css"
      - "vod_banner.png"
      - "source/**"
      - ".github/workflows/deploy-github-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
